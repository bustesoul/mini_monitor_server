# HTTP listen address for local report and health endpoints.
server:
  listen: "127.0.0.1:18080"

# Metric collection interval and CPU sampling window.
collector:
  interval: "60s"
  cpu_sample_window: "2s"

# Persistent storage for the full installation profile.
storage:
  dir: "/var/lib/mini_monitor_server"
  keep_days_local: 30
  dir_size_alert_mb: 5120
  dir_size_check_interval: "10m"

# Network interfaces to track and whether to reset counters on restart.
network:
  enabled: true
  interfaces:
    - "eth0"
  reset_baseline_on_start: true
  daily_rollup: true

# Disk mounts to monitor and the daily snapshot time in HH:MM.
disk:
  enabled: true
  mounts:
    - "/"
  sample_daily_at: "00:00"

# Alert deduplication and repeat reminder intervals.
alerts:
  dedup_window: "30m"
  repeat_interval: "6h"

# Threshold rules; each rule needs a unique name, type, threshold, for, and severity.
rules:
  - name: "disk_root_high"
    type: "disk_used_percent"
    mount: "/"
    threshold: 90
    for: "5m"
    severity: "critical"

  - name: "memory_high"
    type: "memory_used_percent"
    threshold: 85
    for: "10m"
    severity: "warning"

  - name: "cpu_high"
    type: "cpu_used_percent"
    threshold: 95
    for: "3m"
    severity: "warning"

# Notification backends.
notify:
  telegram:
    enabled: false
    bot_token: ""
    chat_id: ""
    commands_enabled: false
    allowed_chat_ids: []

# Default number of days returned by history endpoints.
history:
  default_days: 7

# VictoriaMetrics single-node + vmagent enabled for persistent full installation.
integrations:
  victoriametrics:
    enabled: true
    binary: "/usr/local/lib/mini_monitor_server/bin/victoria-metrics-prod"
    listen_addr: "127.0.0.1:8428"
    data_path: "/var/lib/mini_monitor_server/victoria-metrics"
    retention_days: 90

  vmagent:
    enabled: true
    binary: "/usr/local/lib/mini_monitor_server/bin/vmagent"
    listen_addr: "127.0.0.1:8429"
    scrape_interval: "60s"
    remote_write_url: ""
