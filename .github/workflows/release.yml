name: Release

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Read version
        id: meta
        run: |
          VERSION=$(tr -d '[:space:]' < VERSION)
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Check if already released
        id: check
        run: |
          if git rev-parse "refs/tags/${{ steps.meta.outputs.VERSION }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Go
        if: steps.check.outputs.exists == 'false'
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Test
        if: steps.check.outputs.exists == 'false'
        run: CGO_ENABLED=0 go test ./...

      - name: Build
        if: steps.check.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.meta.outputs.VERSION }}"
          LDFLAGS="-s -w -X main.version=${VERSION}"
          BUILD_TAGS="osusergo netgo"

          for arch in amd64 arm64; do
            mkdir -p "build/${arch}"
            CGO_ENABLED=0 GOOS=linux GOARCH="${arch}" \
              go build \
                -trimpath \
                -tags "${BUILD_TAGS}" \
                -ldflags "${LDFLAGS}" \
                -o "build/${arch}/mini_monitor_server" \
                ./cmd/mini_monitor_server
          done

      - name: Setup Go For VictoriaMetrics
        if: steps.check.outputs.exists == 'false'
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: false

      - name: Build bundled VictoriaMetrics binaries
        if: steps.check.outputs.exists == 'false'
        run: |
          . ./third_party_versions.env

          build_vm_component() {
            arch="$1"
            source_dir="$RUNNER_TEMP/victoriametrics-src-${arch}"

            rm -rf "${source_dir}"
            git clone --branch "${VICTORIAMETRICS_VERSION}" --depth 1 \
              https://github.com/VictoriaMetrics/VictoriaMetrics.git "${source_dir}"

            (
              cd "${source_dir}"
              CGO_ENABLED=0 GOOS=linux GOARCH="${arch}" make victoria-metrics-pure vmagent-pure
            )

            mkdir -p "build/${arch}/third_party"

            cp "${source_dir}/bin/victoria-metrics-pure" "build/${arch}/third_party/victoria-metrics-prod"
            cp "${source_dir}/bin/vmagent-pure" "build/${arch}/third_party/vmagent"
            chmod +x "build/${arch}/third_party/victoria-metrics-prod" "build/${arch}/third_party/vmagent"
          }

          build_vm_component amd64
          build_vm_component arm64

      - name: Verify static binaries
        if: steps.check.outputs.exists == 'false'
        run: |
          verify_static_binary() {
            bin="$1"
            info="$(file "${bin}")"
            echo "${info}"
            if [[ "${info}" != *"statically linked"* ]]; then
              echo "binary is not statically linked: ${bin}" >&2
              exit 1
            fi
          }

          for arch in amd64 arm64; do
            verify_static_binary "build/${arch}/mini_monitor_server"
            verify_static_binary "build/${arch}/third_party/victoria-metrics-prod"
            verify_static_binary "build/${arch}/third_party/vmagent"
          done

      - name: Package
        if: steps.check.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.meta.outputs.VERSION }}"

          for arch in amd64 arm64; do
            dir="mini_monitor_server-${VERSION}-linux-musl-${arch}"
            mkdir -p "dist/${dir}"

            cp "build/${arch}/mini_monitor_server"         "dist/${dir}/"
            mkdir -p                                     "dist/${dir}/third_party"
            cp "build/${arch}/third_party/"*             "dist/${dir}/third_party/"
            cp mini_monitor_server.example.yaml            "dist/${dir}/"
            cp mini_monitor_server.full.example.yaml       "dist/${dir}/"
            cp scripts/mini_monitor_server.service         "dist/${dir}/"
            cp scripts/install.sh                          "dist/${dir}/"
            cp third_party_versions.env                    "dist/${dir}/"
            chmod +x                                       "dist/${dir}/install.sh"
            cp README.md                                   "dist/${dir}/"

            tar -czf "dist/${dir}.tar.gz" -C dist "${dir}"
          done

      - name: Create Release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.VERSION }}
          name: ${{ steps.meta.outputs.VERSION }}
          generate_release_notes: true
          files: dist/*.tar.gz
