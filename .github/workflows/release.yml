name: Release

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Read version
        id: meta
        run: |
          VERSION=$(tr -d '[:space:]' < VERSION)
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Check if already released
        id: check
        run: |
          if git rev-parse "refs/tags/${{ steps.meta.outputs.VERSION }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Go
        if: steps.check.outputs.exists == 'false'
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Test
        if: steps.check.outputs.exists == 'false'
        run: go test ./...

      - name: Build
        if: steps.check.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.meta.outputs.VERSION }}"
          LDFLAGS="-s -w -X main.version=${VERSION}"

          GOOS=linux GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o build/amd64/mini_monitor_server ./cmd/mini_monitor_server
          GOOS=linux GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o build/arm64/mini_monitor_server ./cmd/mini_monitor_server

      - name: Download bundled VictoriaMetrics binaries
        if: steps.check.outputs.exists == 'false'
        run: |
          . ./third_party_versions.env

          download_vm_component() {
            arch="$1"
            archive_name="$2"
            target_name="$3"
            archive_path="$RUNNER_TEMP/${archive_name}"
            extract_dir="$RUNNER_TEMP/extract-${arch}-${target_name}"

            curl -fL "https://github.com/VictoriaMetrics/VictoriaMetrics/releases/download/${VICTORIAMETRICS_VERSION}/${archive_name}" -o "${archive_path}"
            rm -rf "${extract_dir}"
            mkdir -p "${extract_dir}"
            tar -xzf "${archive_path}" -C "${extract_dir}"

            binary_path="$(find "${extract_dir}" -type f \( -name "${target_name}" -o -name "${target_name}-prod" \) | head -n 1)"
            if [[ -z "${binary_path}" ]]; then
              echo "failed to find ${target_name} in ${archive_name}" >&2
              exit 1
            fi

            mkdir -p "build/${arch}/third_party"
            cp "${binary_path}" "build/${arch}/third_party/${target_name}"
            chmod +x "build/${arch}/third_party/${target_name}"
          }

          download_vm_component amd64 "victoria-metrics-linux-amd64-${VICTORIAMETRICS_VERSION}.tar.gz" "victoria-metrics-prod"
          download_vm_component amd64 "vmutils-linux-amd64-${VICTORIAMETRICS_VERSION}.tar.gz" "vmagent"
          download_vm_component arm64 "victoria-metrics-linux-arm64-${VICTORIAMETRICS_VERSION}.tar.gz" "victoria-metrics-prod"
          download_vm_component arm64 "vmutils-linux-arm64-${VICTORIAMETRICS_VERSION}.tar.gz" "vmagent"

      - name: Package
        if: steps.check.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.meta.outputs.VERSION }}"

          for arch in amd64 arm64; do
            dir="mini_monitor_server-${VERSION}-linux-${arch}"
            mkdir -p "dist/${dir}"

            cp "build/${arch}/mini_monitor_server"         "dist/${dir}/"
            mkdir -p                                     "dist/${dir}/third_party"
            cp "build/${arch}/third_party/"*             "dist/${dir}/third_party/"
            cp mini_monitor_server.example.yaml            "dist/${dir}/"
            cp mini_monitor_server.full.example.yaml       "dist/${dir}/"
            cp scripts/mini_monitor_server.service         "dist/${dir}/"
            cp scripts/install.sh                          "dist/${dir}/"
            cp third_party_versions.env                    "dist/${dir}/"
            chmod +x                                       "dist/${dir}/install.sh"
            cp README.md                                   "dist/${dir}/"

            tar -czf "dist/${dir}.tar.gz" -C dist "${dir}"
          done

      - name: Create Release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.VERSION }}
          name: ${{ steps.meta.outputs.VERSION }}
          generate_release_notes: true
          files: dist/*.tar.gz
